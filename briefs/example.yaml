# Example Brand Brief
brand:
  name: "Acme Studio"
  tagline: "Create without limits"
  colors:
    primary: "#0f3460"
    secondary: "#e94560"
    accent: "#16213e"
    background: "#1a1a2e"
  fonts:
    heading: "Inter"
    body: "Inter"
  logo: "assets/logo.png"
  style: "modern, minimalist, tech-forward"

assets:
